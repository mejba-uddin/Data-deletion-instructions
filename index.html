<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeavensBD – Info Center</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 700px;
      margin: 60px auto;
      background: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      color: #1877f2;
      margin-bottom: 10px;
    }
    .desc {
      color: #555;
      margin-bottom: 30px;
      font-size: 18px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      margin-bottom: 30px;
    }
    .link-btn {
      display: inline-block;
      background: #1877f2;
      color: #fff;
      padding: 14px 32px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 17px;
      font-weight: 500;
      transition: background 0.2s;
      box-shadow: 0 2px 8px rgba(24,119,242,0.08);
    }
    .link-btn:hover {
      background: #145dc1;
    }
    .footer {
      margin-top: 40px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HeavensBD – Info Center</h1>
    <div class="desc">Access all important information and policies for HeavensBD from one place.</div>
    <div class="links">
      <a href="privacy-policy.html" class="link-btn">Privacy Policy</a>
      <a href="terms.html" class="link-btn">Terms & Conditions</a>
      <a href="delete-data.html" class="link-btn">Data Deletion Instructions</a>
    </div>
    <div class="footer">&copy; 2026 HeavensBD. All rights reserved.</div>
  </div>
</body>
</html>
